<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regulator Report — FairTrust AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        }
        
        :root {
            --primary: #1A2D4E;      /* Deep Navy - dominant */
            --primary-light: #2A3F66;
            --primary-soft: #E9ECF3;  /* Soft navy-tinted background */
            --secondary: #EBB255;     /* Gold/Amber - minimal accents */
            --accent: #4A90E2;        /* Soft Blue */
            --success: #059669;
            --success-light: rgba(5, 150, 105, 0.12);
            --warning: #D97706;
            --warning-light: rgba(217, 119, 6, 0.12);
            --danger: #DC2626;
            --danger-light: rgba(220, 38, 38, 0.12);
            --bg: #F5F6FA;
            --surface: #FFFFFF;
            --text: #1A2D4E;
            --text-muted: #5A6169;
            --border: #E4E7F0;
            --shadow: 0 10px 30px rgba(26, 45, 78, 0.08);
            --radius: 12px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        }

        /* ================= NAVBAR ================= */
        .navbar {
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            padding: 16px 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            z-index: 1000;
            backdrop-filter: blur(10px);
            transition: var(--transition);
            border-bottom: 1px solid rgba(235, 178, 85, 0.15);
        }

        .navbar.scrolled {
            padding: 12px 5%;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            color: var(--primary);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), #4A90E2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(26, 45, 78, 0.2);
            transition: var(--transition);
        }

        .logo:hover .logo-icon {
            transform: rotate(5deg) scale(1.05);
        }

        .logo-text {
            font-size: 22px;
            font-weight: 800;
            line-height: 1.2;
        }

        .logo-text span {
            color: var(--secondary);
        }

        .logo-subtitle {
            font-size: 12px;
            font-weight: 500;
            color: var(--secondary);
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
            position: relative;
            padding: 8px 0;
            transition: var(--transition);
        }

        .nav-links a:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 3px;
            background: var(--secondary);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--secondary);
        }

        .nav-links a:hover:after {
            width: 100%;
        }

        .nav-links a.active {
            color: var(--secondary);
        }

        .nav-links a.active:after {
            width: 100%;
        }

        /* ================= MAIN CONTENT ================= */
        .regulator-report { 
            max-width: 720px; 
            margin: 0 auto; 
            padding: 2rem 5%; 
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .report-meta {
            font-size: 0.8125rem;
            color: var(--text-muted);
        }

        .report-meta code {
            background: var(--primary-soft);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            color: var(--primary);
        }

        .home-link {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
            margin-left: 0.5rem;
            transition: var(--transition);
        }

        .home-link:hover {
            color: var(--primary);
        }

        /* State card */
        .state-card { 
            background: var(--surface); 
            border: 2px solid rgba(26, 45, 78, 0.08);
            border-radius: var(--radius); 
            padding: 4rem 2rem; 
            text-align: center;
            box-shadow: var(--shadow);
        }

        .state-card h2 { 
            font-size: 1.5rem; 
            font-weight: 700; 
            color: var(--primary);
            margin-bottom: 0.75rem; 
        }

        .state-card p { 
            color: var(--text-muted); 
            font-size: 0.9375rem; 
            margin-bottom: 1.5rem; 
        }

        /* Certificate */
        .certificate-section { 
            background: var(--surface); 
            border: 2px solid var(--secondary); 
            border-radius: var(--radius); 
            padding: 2rem 2.5rem; 
            margin-bottom: 2rem; 
            position: relative; 
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .certificate-section:hover {
            border-color: var(--primary);
            box-shadow: 0 15px 35px rgba(26, 45, 78, 0.12);
        }

        .certificate-border { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            right: 10px; 
            bottom: 10px; 
            border: 1px solid rgba(235, 178, 85, 0.3); 
            border-radius: 10px; 
            pointer-events: none; 
        }

        .certificate-header { 
            text-align: center; 
            margin-bottom: 1.5rem; 
        }

        .certificate-header h1 { 
            font-size: 1.5rem; 
            color: var(--primary); 
            font-weight: 800; 
            margin-bottom: 0.5rem; 
            position: relative;
            display: inline-block;
        }

        .certificate-header h1:after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: var(--secondary);
            border-radius: 2px;
        }

        .certificate-header p { 
            color: var(--text-muted); 
            font-size: 0.875rem; 
            margin-top: 1rem;
        }

        .certificate-seal { 
            width: 72px; 
            height: 72px; 
            background: linear-gradient(135deg, var(--primary), #2A3F66); 
            border-radius: 50%; 
            margin: 1.5rem auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 2rem; 
            color: var(--secondary); 
            box-shadow: 0 4px 12px rgba(26, 45, 78, 0.3); 
        }

        .certificate-body { 
            text-align: center; 
            margin: 1.5rem 0; 
        }

        .certificate-body > p { 
            color: var(--text-muted); 
            font-size: 0.9375rem; 
        }

        .certificate-org { 
            font-size: 1.75rem; 
            font-weight: 800; 
            margin: 0.75rem 0 0.25rem; 
            color: var(--primary); 
        }

        .certificate-model { 
            font-size: 0.9375rem; 
            color: var(--text-muted); 
            margin-bottom: 1.25rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .certificate-model i {
            color: var(--secondary);
        }

        .score-badge { 
            display: inline-block; 
            padding: 0.75rem 2rem; 
            border-radius: 999px; 
            font-size: 1.125rem; 
            font-weight: 700; 
            color: white; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .score-badge.certified    { 
            background: linear-gradient(135deg, var(--success), #047857); 
        }

        .score-badge.conditional  { 
            background: linear-gradient(135deg, var(--warning), #B45309); 
        }

        .score-badge.not-certified { 
            background: linear-gradient(135deg, var(--danger), #B91C1C); 
        }

        .certificate-dates { 
            display: flex; 
            justify-content: center; 
            gap: 2rem; 
            margin: 1.5rem 0; 
            color: var(--text-muted); 
            font-size: 0.875rem; 
        }

        .certificate-dates i {
            color: var(--secondary);
            margin-right: 4px;
        }

        .cert-note { 
            font-size: 0.875rem; 
            color: var(--text-muted); 
            line-height: 1.6; 
            margin-top: 0.75rem; 
        }

        .cert-note strong {
            color: var(--primary);
        }

        .certificate-footer { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            margin-top: 2rem; 
            padding-top: 1.5rem; 
            border-top: 2px solid rgba(235, 178, 85, 0.2); 
        }

        .signature { 
            text-align: center; 
        }

        .signature-line { 
            width: 160px; 
            height: 2px; 
            background: var(--primary); 
            margin: 0.5rem 0; 
        }

        .signature-name { 
            font-size: 0.875rem; 
            font-weight: 600; 
            color: var(--primary);
        }

        .signature-title { 
            font-size: 0.75rem; 
            color: var(--text-muted); 
        }

        .eval-id-badge { 
            font-size: 0.7rem; 
            color: var(--text-muted); 
            font-family: 'SF Mono', monospace; 
            background: var(--primary-soft); 
            border: 1px solid rgba(26, 45, 78, 0.15); 
            padding: 0.35rem 0.75rem; 
            border-radius: 6px; 
            word-break: break-all; 
            max-width: 200px; 
            text-align: right; 
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .eval-id-badge i {
            color: var(--secondary);
        }

        .download-cert { 
            text-align: center; 
            margin-top: 1.5rem; 
        }

        /* Sections */
        .compliance-section, 
        .audit-section, 
        .legal-section { 
            background: var(--surface); 
            border: 2px solid rgba(26, 45, 78, 0.08);
            border-radius: var(--radius); 
            padding: 2rem; 
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .compliance-section:hover,
        .audit-section:hover,
        .legal-section:hover {
            border-color: rgba(26, 45, 78, 0.15);
            box-shadow: 0 15px 35px rgba(26, 45, 78, 0.12);
        }

        .section-title { 
            font-size: 1.25rem; 
            font-weight: 700; 
            color: var(--primary);
            margin-bottom: 1.5rem;
            position: relative;
            display: inline-block;
        }

        .section-title:after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 40px;
            height: 3px;
            background: var(--secondary);
            border-radius: 2px;
        }

        .compliance-summary { 
            display: flex; 
            gap: 0.75rem; 
            margin-bottom: 1.5rem; 
            flex-wrap: wrap; 
        }

        .summary-chip { 
            padding: 0.4rem 1rem; 
            border-radius: 999px; 
            font-size: 0.8125rem; 
            font-weight: 600; 
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
        }

        .summary-chip.pass { 
            background: var(--success-light); 
            color: var(--success); 
        }

        .summary-chip.fail { 
            background: var(--danger-light); 
            color: var(--danger); 
        }

        .summary-chip.neutral { 
            background: var(--primary-soft); 
            border: 1px solid rgba(26, 45, 78, 0.15); 
            color: var(--primary); 
        }

        .compliance-table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 0.875rem; 
        }

        .compliance-table th { 
            background: var(--primary-soft); 
            padding: 0.75rem 1rem; 
            text-align: left; 
            font-weight: 600; 
            font-size: 0.8125rem; 
            color: var(--primary); 
        }

        .compliance-table td { 
            padding: 0.75rem 1rem; 
            border-bottom: 1px solid var(--border); 
        }

        .compliance-table tr:last-child td { 
            border-bottom: none; 
        }

        .compliance-table tr:hover td {
            background: var(--primary-soft);
        }

        .status-pass { 
            color: var(--success); 
            font-weight: 700; 
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .status-fail { 
            color: var(--danger); 
            font-weight: 700; 
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        /* Timeline */
        .timeline { 
            position: relative; 
            padding: 0.5rem 0; 
        }

        .timeline::before { 
            content: ''; 
            position: absolute; 
            left: 19px; 
            top: 0; 
            bottom: 0; 
            width: 2px; 
            background: var(--primary-soft); 
        }

        .timeline-item { 
            position: relative; 
            padding-left: 56px; 
            margin-bottom: 1.5rem; 
        }

        .timeline-item:last-child { 
            margin-bottom: 0; 
        }

        .timeline-dot { 
            position: absolute; 
            left: 12px; 
            top: 3px; 
            width: 16px; 
            height: 16px; 
            border-radius: 50%; 
            background: var(--secondary); 
            border: 3px solid var(--surface); 
            box-shadow: 0 0 0 2px rgba(235, 178, 85, 0.3); 
        }

        .timeline-date { 
            font-weight: 600; 
            color: var(--secondary); 
            font-size: 0.8125rem; 
            margin-bottom: 0.2rem; 
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .timeline-date i {
            font-size: 0.7rem;
        }

        .timeline-title { 
            font-weight: 600; 
            font-size: 0.9375rem; 
            color: var(--primary);
        }

        .timeline-detail { 
            color: var(--text-muted); 
            font-size: 0.8125rem; 
            margin-top: 0.15rem; 
        }

        .shap-audit-table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 0.875rem; 
            margin-top: 1rem; 
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .shap-audit-table td { 
            padding: 0.75rem 1rem; 
            border-bottom: 1px solid var(--border); 
        }

        .shap-audit-table td:first-child { 
            color: var(--text-muted); 
            width: 50%; 
            background: var(--bg);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .shap-audit-table td:first-child i {
            color: var(--secondary);
        }

        .shap-audit-table td:last-child { 
            font-weight: 600; 
            color: var(--primary);
        }

        .shap-audit-table tr:last-child td { 
            border-bottom: none; 
        }

        /* Legal badges */
        .legal-badges { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 0.5rem; 
            margin-bottom: 1.25rem; 
        }

        .legal-badge { 
            display: inline-block; 
            padding: 0.4rem 0.9rem; 
            border-radius: 20px; 
            font-size: 0.875rem; 
            font-weight: 600; 
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }

        .badge-compliant { 
            background: var(--success-light); 
            color: var(--success); 
        }

        .badge-ready     { 
            background: var(--primary-soft); 
            color: var(--primary); 
        }

        .badge-review    { 
            background: var(--warning-light); 
            color: var(--warning); 
        }

        .legal-framework { 
            background: var(--bg); 
            border: 1px solid rgba(26, 45, 78, 0.1); 
            border-radius: 8px; 
            padding: 1.25rem; 
            margin-bottom: 0.75rem; 
            transition: var(--transition);
        }

        .legal-framework:hover {
            border-color: var(--secondary);
            background: white;
        }

        .legal-framework:last-child { 
            margin-bottom: 0; 
        }

        .legal-framework-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 0.4rem; 
        }

        .legal-framework-title { 
            font-weight: 600; 
            font-size: 0.9375rem; 
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .legal-framework-note { 
            font-size: 0.8125rem; 
            color: var(--text-muted); 
            line-height: 1.5; 
        }

        /* Buttons */
        .btn { 
            padding: 0.7rem 1.5rem; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 0.875rem; 
            cursor: pointer; 
            transition: var(--transition); 
            border: 2px solid transparent; 
            font-family: inherit; 
            display: inline-flex; 
            align-items: center; 
            gap: 0.5rem; 
        }

        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), #2c3e50); 
            color: white; 
            box-shadow: 0 4px 15px rgba(26, 45, 78, 0.2);
        }

        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26, 45, 78, 0.3);
        }

        .btn-secondary { 
            background: var(--surface); 
            border: 2px solid var(--border); 
            color: var(--primary); 
        }

        .btn-secondary:hover { 
            border-color: var(--secondary); 
            color: var(--secondary); 
            background: rgba(235, 178, 85, 0.05);
        }

        .export-options { 
            display: flex; 
            gap: 0.75rem; 
            justify-content: center; 
            margin-top: 2rem; 
            flex-wrap: wrap; 
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .certificate-section,
        .compliance-section,
        .audit-section,
        .legal-section {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @media print {
            .navbar, .export-options, .btn { 
                display: none; 
            }
            body { 
                background: white; 
            }
        }
        
        @media (max-width: 600px) {
            .certificate-footer { 
                flex-direction: column; 
                gap: 1rem; 
                align-items: center; 
            }
            
            .certificate-dates { 
                flex-direction: column; 
                gap: 0.5rem; 
            }
            
            .navbar {
                padding: 12px 5%;
            }
            
            .nav-links {
                gap: 15px;
            }
        }

        @media (max-width: 640px) {
            .nav-links {
                display: none;
            }
            
            .logo-text {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar" id="navbar">
    <a href="index.html" class="logo">
        <div class="logo-icon">
            <i class="fas fa-shield-alt"></i>
        </div>
        <div>
            <div class="logo-text">Fair<span>Trust</span></div>
            <div class="logo-subtitle">ETHICAL AI</div>
        </div>
    </a>

    <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="docs.html">Docs</a>
        <a href="admin.html">Admin</a>
    </div>
</nav>

<main class="regulator-report" id="app">
    <div class="state-card">
        <i class="fas fa-spinner fa-pulse" style="font-size: 2rem; color: var(--secondary); margin-bottom: 1rem;"></i>
        <h2>Loading report…</h2>
        <p>Fetching certification data.</p>
    </div>
</main>

<script>
    const API_BASE = 'http://127.0.0.1:5000';

    // Navbar scroll effect
    window.addEventListener('scroll', function() {
        const navbar = document.getElementById('navbar');
        if (window.scrollY > 50) {
            navbar.classList.add('scrolled');
        } else {
            navbar.classList.remove('scrolled');
        }
    });

    function renderNoData(msg) {
        document.getElementById('app').innerHTML = `
            <div class="state-card">
                <i class="fas fa-exclamation-circle" style="font-size: 2rem; color: var(--warning); margin-bottom: 1rem;"></i>
                <h2>No report found</h2>
                <p>${msg || 'Complete an evaluation first.'}</p>
                <a href="upload.html" class="btn btn-primary" style="display:inline-flex;margin-top:0.5rem">
                    <i class="fas fa-play-circle"></i> Start evaluation
                </a>
            </div>`;
    }

    // ── Certificate ───────────────────────────────────────────────────────
    function renderCertificate(cert, evalId) {
        const badgeClass = cert.certified ? 'certified'
            : cert.status === 'CONDITIONAL' ? 'conditional' : 'not-certified';
        const badgeLabel = cert.certified
            ? `✓ Fairtrust Score: ${cert.fairness_score}`
            : `⚠ Score: ${cert.fairness_score} — Conditional`;

        return `
        <section class="certificate-section">
            <div class="certificate-border"></div>
            <div class="certificate-header">
                <h1>Certificate of Fairtrust AI Compliance</h1>
                <p>Issued by the Fairtrust AI Framework</p>
                <div class="certificate-seal">
                    <i class="fas fa-certificate"></i>
                </div>
            </div>
            <div class="certificate-body">
                <p>This is to certify that</p>
                <div class="certificate-org">${cert.organization}</div>
                <div class="certificate-model">
                    <i class="fas fa-robot"></i> Model ID: ${cert.model_name}
                </div>
                <div style="margin:1.5rem 0">
                    <span class="score-badge ${badgeClass}">${badgeLabel}</span>
                </div>
                <div class="certificate-dates">
                    <div><i class="fas fa-calendar-check"></i> Issued: ${cert.issued_at}</div>
                    <div><i class="fas fa-hourglass-half"></i> Valid until: ${cert.valid_until}</div>
                </div>
                <p class="cert-note">
                    This model has been evaluated across <strong>all 7 fairness dimensions</strong><br>
                    and ${cert.certified ? 'meets' : 'partially meets'} the required standards for ethical AI deployment.
                </p>
            </div>
            <div class="certificate-footer">
                <div class="signature">
                    <div class="signature-line"></div>
                    <div class="signature-name">Fairtrust AI Framework</div>
                    <div class="signature-title">Automated Ethics Certification</div>
                </div>
                <div class="eval-id-badge">
                    <i class="fas fa-fingerprint"></i> Eval ID:<br>${evalId || '—'}
                </div>
            </div>
            <div class="download-cert">
                <button class="btn btn-primary" onclick="downloadPDF()">
                    <i class="fas fa-file-pdf"></i> Download Certificate PDF
                </button>
            </div>
        </section>`;
    }

    // ── Compliance table ──────────────────────────────────────────────────
    function renderCompliance(compliance, summary) {
        const rows = compliance.map(r => `
            <tr>
                <td>${r.requirement}</td>
                <td>${r.threshold}</td>
                <td>${r.achieved}</td>
                <td class="${r.passed ? 'status-pass' : 'status-fail'}">
                    ${r.passed ? '<i class="fas fa-check-circle"></i> PASS' : '<i class="fas fa-exclamation-circle"></i> FAIL'}
                </td>
            </tr>`).join('');

        return `
        <section class="compliance-section">
            <h2 class="section-title"><i class="fas fa-clipboard-check" style="margin-right:8px; color: var(--secondary);"></i>Fairness Contract Compliance</h2>
            <div class="compliance-summary">
                <span class="summary-chip neutral"><i class="fas fa-list"></i> Total: ${summary.total}</span>
                <span class="summary-chip pass"><i class="fas fa-check-circle"></i> Passed: ${summary.passed}</span>
                ${summary.failed > 0 ? `<span class="summary-chip fail"><i class="fas fa-exclamation-circle"></i> Failed: ${summary.failed}</span>` : ''}
            </div>
            <table class="compliance-table">
                <thead>
                    <tr><th>Requirement</th><th>Threshold</th><th>Achieved</th><th>Status</th></tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        </section>`;
    }

    // ── Audit trail ───────────────────────────────────────────────────────
    function renderAudit(auditTrail, shapAudit) {
        const timelineItems = auditTrail.map(e => `
            <div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="timeline-date"><i class="fas fa-clock"></i> ${e.timestamp}</div>
                <div class="timeline-title">${e.title}</div>
                <div class="timeline-detail">${e.detail}</div>
            </div>`).join('');

        const shapRows = shapAudit && shapAudit.top_feature ? `
            <tr><td><i class="fas fa-chart-line"></i> Feature Stability</td><td>${shapAudit.stability_pct}%</td></tr>
            <tr><td><i class="fas fa-arrows-alt-h"></i> SHAP Value Range</td><td>${shapAudit.shap_range}</td></tr>
            <tr><td><i class="fas fa-star"></i> Top Feature</td><td>${shapAudit.top_feature} (SHAP: ${shapAudit.top_feature_shap})</td></tr>
        ` : `<tr><td colspan="2" style="color:var(--text-muted);font-style:italic;text-align:center">No SHAP data available</td></tr>`;

        return `
        <section class="audit-section">
            <h2 class="section-title"><i class="fas fa-history" style="margin-right:8px; color: var(--secondary);"></i>Audit Trail</h2>
            <div class="timeline">${timelineItems}</div>
            <h3 style="margin-top:1.5rem;font-size:0.9375rem;font-weight:600;margin-bottom:0.5rem;color:var(--primary)">
                <i class="fas fa-chart-bar" style="color: var(--secondary); margin-right:6px;"></i>SHAP Audit Summary
            </h3>
            <table class="shap-audit-table">${shapRows}</table>
        </section>`;
    }

    // ── Legal section ─────────────────────────────────────────────────────
    function renderLegal(legal) {
        const frameworks = (legal.frameworks || []).map(f => {
            const badgeC = f.status === 'COMPLIANT' ? 'badge-compliant'
                : f.status === 'READY' ? 'badge-ready' : 'badge-review';
            const icon = f.status === 'COMPLIANT' ? 'fa-check-circle' 
                : f.status === 'READY' ? 'fa-clock' : 'fa-exclamation-triangle';
            return `
            <div class="legal-framework">
                <div class="legal-framework-header">
                    <span class="legal-framework-title"><i class="fas ${icon}" style="color: var(--secondary); margin-right:6px;"></i>${f.label}</span>
                    <span class="legal-badge ${badgeC}">${f.status}</span>
                </div>
                <div class="legal-framework-note">${f.note}</div>
            </div>`;
        }).join('');

        return `
        <section class="legal-section">
            <h2 class="section-title"><i class="fas fa-gavel" style="margin-right:8px; color: var(--secondary);"></i>Legal & Regulatory Compliance</h2>
            ${frameworks}
        </section>`;
    }

    // ── Full render ───────────────────────────────────────────────────────
    function renderReport(data, evalId) {
        const backLink = `index.html`;
        document.getElementById('app').innerHTML = `
            <div class="report-header">
                <div class="report-meta">
                    <i class="fas fa-fingerprint" style="color: var(--secondary);"></i> Eval ID: <code>${evalId || '—'}</code>
                    <a href="${backLink}" class="home-link"><i class="fas fa-home"></i> Home</a>
                </div>
            </div>
            ${renderCertificate(data.certificate, evalId)}
            ${renderCompliance(data.compliance, data.compliance_summary)}
            ${renderAudit(data.audit_trail, data.shap_audit)}
            ${renderLegal(data.legal)}
            <div class="export-options">
                <button class="btn btn-primary" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> Export PDF Report</button>
                <button class="btn btn-secondary" onclick="exportJSON()"><i class="fas fa-file-code"></i> Export JSON</button>
                <button class="btn btn-secondary" onclick="window.print()"><i class="fas fa-print"></i> Print</button>
            </div>`;
    }

    // ── Actions ───────────────────────────────────────────────────────────
    function downloadPDF()  { 
        alert('Preparing certificate PDF…'); 
    }
    
    function exportPDF()    { 
        alert('Exporting full regulator report as PDF…'); 
    }
    
    function exportJSON() {
        const cached = sessionStorage.getItem('eval_result');
        if (!cached) { alert('No data to export.'); return; }
        const blob = new Blob([cached], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = 'regulator_report.json'; a.click();
    }

    // ── Init ──────────────────────────────────────────────────────────────
    (async function init() {
        const evalId = new URLSearchParams(location.search).get('eval_id')
                    || sessionStorage.getItem('eval_id');

        if (!evalId) { renderNoData('No evaluation ID found.'); return; }

        try {
            const res  = await fetch(`${API_BASE}/report/regulator/${evalId}`);
            const data = await res.json();

            if (res.ok && data.status === 'complete') {
                renderReport(data, evalId);
            } else {
                throw new Error(data.error || 'not complete');
            }
        } catch (_) {
            // Fallback: build a minimal view from cached eval_result
            const cached = sessionStorage.getItem('eval_result');
            if (cached) {
                const raw     = JSON.parse(cached);
                const fairness = raw.fairness || {};
                const score   = raw.ethical_score || 0;
                const now     = new Date();

                // Reuse the same compliance logic client-side
                const RULES = [
                    { key: "disparateImpact",    min: 0.80, label: "80% Rule (Disparate Impact)" },
                    { key: "groupFairness",      min: 0.80, label: "Group Fairness" },
                    { key: "individualFairness", min: 0.85, label: "Individual Fairness" },
                    { key: "counterfactual",     min: 0.90, label: "Counterfactual Fairness" },
                ];
                const compliance = RULES.map(r => {
                    const v = fairness[r.key] || 0;
                    const passed = v >= r.min;
                    return { requirement: r.label, threshold: `≥ ${r.min}`, achieved: v.toFixed(4), passed, status: passed ? 'PASS' : 'FAIL' };
                });
                const passed = compliance.filter(r => r.passed).length;

                renderReport({
                    certificate: {
                        organization:  "Fairtrust AI",
                        model_name:    raw.model_id || "Unknown",
                        fairness_score: score,
                        issued_at:     now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }),
                        valid_until:   new Date(now.setFullYear(now.getFullYear() + 1)).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }),
                        certified:     passed === compliance.length,
                        status:        passed === compliance.length ? 'CERTIFIED' : 'CONDITIONAL',
                    },
                    compliance,
                    compliance_summary: { total: compliance.length, passed, failed: compliance.length - passed, all_passed: passed === compliance.length },
                    audit_trail: [{ timestamp: new Date().toUTCString(), title: "Evaluation Complete", detail: `Score: ${score}` }],
                    shap_audit:  raw.shap ? { 
                        top_feature: raw.shap.topFeature, 
                        stability_pct: Math.round((raw.shap.featureStability || 0) * 100), 
                        shap_range: `[${raw.shap.shapMin?.toFixed(4)}, ${raw.shap.shapMax?.toFixed(4)}]`, 
                        top_feature_shap: raw.shap.shapMax?.toFixed(4) 
                    } : {},
                    legal: { frameworks: [
                        { label: "🇮🇳 India — Voluntary Compliance", note: "Aligned with NITI Aayog's Responsible AI principles.", status: "COMPLIANT" },
                        { label: "🇪🇺 EU AI Act — Ready", note: "Transparency and documentation requirements met.", status: score >= 0.75 ? "READY" : "REVIEW" },
                        { label: "🔒 GDPR Compliant", note: "Right to explanation supported.", status: "COMPLIANT" },
                    ]},
                }, evalId);
                return;
            }
            renderNoData('Could not load regulator report.');
        }
    })();

    // Make functions global for onclick handlers
    window.downloadPDF = downloadPDF;
    window.exportPDF = exportPDF;
    window.exportJSON = exportJSON;
</script>
</body>
</html>
