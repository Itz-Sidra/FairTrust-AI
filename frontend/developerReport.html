<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Report — FairTrust AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        }
        
        :root {
            --primary: #1A2D4E;      /* Deep Navy - dominant */
            --primary-light: #2A3F66;
            --primary-soft: #E9ECF3;  /* Soft navy-tinted background */
            --secondary: #EBB255;     /* Gold/Amber - minimal accents */
            --accent: #4A90E2;        /* Soft Blue */
            --success: #059669;
            --success-light: rgba(5, 150, 105, 0.12);
            --warning: #D97706;
            --warning-light: rgba(217, 119, 6, 0.12);
            --danger: #DC2626;
            --danger-light: rgba(220, 38, 38, 0.12);
            --bg: #F5F6FA;
            --surface: #FFFFFF;
            --text: #1A2D4E;
            --text-muted: #5A6169;
            --border: #E4E7F0;
            --shadow: 0 10px 30px rgba(26, 45, 78, 0.08);
            --radius: 12px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        }

        /* ================= NAVBAR ================= */
        .navbar {
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            padding: 16px 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            z-index: 1000;
            backdrop-filter: blur(10px);
            transition: var(--transition);
            border-bottom: 1px solid rgba(235, 178, 85, 0.15);
        }

        .navbar.scrolled {
            padding: 12px 5%;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
            text-decoration: none;
            color: var(--primary);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), #4A90E2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(26, 45, 78, 0.2);
            transition: var(--transition);
        }

        .logo:hover .logo-icon {
            transform: rotate(5deg) scale(1.05);
        }

        .logo-text {
            font-size: 22px;
            font-weight: 800;
            line-height: 1.2;
        }

        .logo-text span {
            color: var(--secondary);
        }

        .logo-subtitle {
            font-size: 12px;
            font-weight: 500;
            color: var(--secondary);
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
            position: relative;
            padding: 8px 0;
            transition: var(--transition);
        }

        .nav-links a:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 3px;
            background: var(--secondary);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--secondary);
        }

        .nav-links a:hover:after {
            width: 100%;
        }

        .nav-links a.active {
            color: var(--secondary);
        }

        .nav-links a.active:after {
            width: 100%;
        }

        /* ================= MAIN CONTENT ================= */
        .developer-report { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 2rem 5%; 
        }

        .report-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 2rem; 
            flex-wrap: wrap; 
            gap: 1rem; 
        }

        .report-header h1 { 
            font-size: 1.75rem; 
            font-weight: 800; 
            color: var(--primary);
            position: relative;
            display: inline-block;
        }

        .report-header h1:after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 60px;
            height: 4px;
            background: var(--secondary);
            border-radius: 2px;
        }

        .report-meta { 
            font-size: 0.8125rem; 
            color: var(--text-muted); 
            margin-top: 0.75rem; 
        }

        .report-meta code {
            background: var(--primary-soft);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            color: var(--primary);
        }

        .report-meta a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .report-meta a:hover {
            color: var(--primary);
        }

        .export-buttons { 
            display: flex; 
            gap: 0.75rem; 
        }

        .btn { 
            padding: 0.7rem 1.5rem; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 0.875rem; 
            cursor: pointer; 
            transition: var(--transition); 
            border: 2px solid transparent; 
            font-family: inherit; 
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), #2c3e50); 
            color: white; 
            box-shadow: 0 4px 15px rgba(26, 45, 78, 0.2);
        }

        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26, 45, 78, 0.3);
        }

        .btn-secondary { 
            background: var(--surface); 
            border: 2px solid var(--border); 
            color: var(--primary); 
        }

        .btn-secondary:hover { 
            border-color: var(--secondary); 
            color: var(--secondary); 
            background: rgba(235, 178, 85, 0.05);
        }

        /* State card */
        .state-card { 
            background: var(--surface); 
            border: 2px solid rgba(26, 45, 78, 0.08);
            border-radius: var(--radius); 
            padding: 4rem 2rem; 
            text-align: center;
            box-shadow: var(--shadow);
        }

        .state-card h2 { 
            font-size: 1.5rem; 
            font-weight: 700; 
            color: var(--primary);
            margin-bottom: 0.75rem; 
        }

        .state-card p { 
            color: var(--text-muted); 
            font-size: 0.9375rem; 
            margin-bottom: 1.5rem; 
        }

        /* Sections */
        .shap-section, 
        .accordion-section, 
        .performance-section {
            background: var(--surface); 
            border: 2px solid rgba(26, 45, 78, 0.08);
            border-radius: var(--radius); 
            padding: 2rem; 
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .shap-section:hover,
        .accordion-section:hover,
        .performance-section:hover {
            border-color: rgba(26, 45, 78, 0.15);
            box-shadow: 0 15px 35px rgba(26, 45, 78, 0.12);
        }

        .section-title { 
            font-size: 1.25rem; 
            font-weight: 700; 
            color: var(--primary);
            margin-bottom: 1.5rem;
            position: relative;
            display: inline-block;
        }

        .section-title:after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 40px;
            height: 3px;
            background: var(--secondary);
            border-radius: 2px;
        }

        /* SHAP chart */
        .shap-grid { 
            display: grid; 
            grid-template-columns: 2fr 1fr; 
            gap: 2rem; 
        }

        .shap-plot { 
            background: var(--bg); 
            border-radius: 10px; 
            padding: 1.5rem; 
            border: 1px solid rgba(26, 45, 78, 0.1); 
            min-height: 280px; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; 
        }

        .shap-bars { 
            display: flex; 
            align-items: flex-end; 
            gap: 6px; 
            height: 220px; 
        }

        .shap-bar-wrap { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 6px; 
        }

        .shap-bar { 
            width: 100%; 
            background: linear-gradient(180deg, var(--primary), #2A3F66); 
            border-radius: 4px 4px 0 0; 
            transition: height 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); 
            min-height: 4px; 
        }

        .shap-bar-label { 
            font-size: 0.65rem; 
            color: var(--text-muted); 
            text-align: center; 
            writing-mode: vertical-rl; 
            text-orientation: mixed; 
            transform: rotate(180deg); 
            max-height: 70px; 
            overflow: hidden;
            font-weight: 500;
        }

        .feature-controls { 
            display: flex; 
            flex-direction: column; 
            gap: 1rem; 
        }

        .feature-controls h3 { 
            font-size: 0.9375rem; 
            font-weight: 600; 
            color: var(--primary);
        }

        .feature-list { 
            list-style: none; 
            max-height: 240px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem;
        }

        .feature-list li { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0.5rem 0.75rem; 
            border-bottom: 1px solid var(--border); 
            font-size: 0.875rem; 
        }

        .feature-list li:last-child { 
            border-bottom: none; 
        }

        .feature-list li:hover {
            background: var(--primary-soft);
            border-radius: 6px;
        }

        .feature-val { 
            font-weight: 700; 
            color: var(--secondary); 
            font-size: 0.8125rem; 
        }

        .shap-meta { 
            margin-top: 1rem; 
            display: flex; 
            gap: 0.75rem; 
            flex-wrap: wrap; 
        }

        .shap-chip { 
            padding: 0.35rem 0.875rem; 
            background: var(--primary-soft); 
            border: 1px solid rgba(26, 45, 78, 0.15); 
            border-radius: 6px; 
            font-size: 0.8rem; 
            color: var(--primary);
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }

        .shap-chip i {
            color: var(--secondary);
            font-size: 0.7rem;
        }

        .shap-chip span { 
            font-weight: 700; 
            color: var(--secondary); 
            margin-left: 0.25rem;
        }

        /* Accordion */
        .accordion-item { 
            border: 2px solid rgba(26, 45, 78, 0.08); 
            border-radius: 10px; 
            margin-bottom: 0.75rem; 
            overflow: hidden; 
            transition: var(--transition);
        }

        .accordion-item:hover {
            border-color: rgba(26, 45, 78, 0.15);
        }

        .accordion-header { 
            padding: 1.25rem 1.5rem; 
            background: var(--bg); 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: var(--transition); 
            user-select: none; 
        }

        .accordion-header:hover { 
            background: var(--primary-soft); 
        }

        .accordion-title { 
            display: flex; 
            align-items: center; 
            gap: 1rem; 
            font-size: 0.9375rem; 
            font-weight: 600; 
            color: var(--primary);
        }

        .accordion-title i {
            color: var(--secondary);
            width: 20px;
            font-size: 1rem;
        }

        .dim-score-badge { 
            padding: 0.25rem 0.75rem; 
            border-radius: 6px; 
            font-size: 0.8125rem; 
            font-weight: 600; 
        }

        .dim-score-badge.success { 
            background: var(--success-light); 
            color: var(--success); 
        }

        .dim-score-badge.warning { 
            background: var(--warning-light); 
            color: var(--warning); 
        }

        .accordion-arrow { 
            transition: transform 0.3s ease; 
            font-size: 0.75rem; 
            color: var(--secondary); 
        }

        .accordion-arrow.open { 
            transform: rotate(180deg); 
        }

        .accordion-content { 
            display: none; 
            padding: 1.5rem; 
            font-size: 0.875rem; 
            border-top: 1px solid var(--border); 
        }

        .accordion-content.active { 
            display: block; 
        }

        .accordion-content p { 
            color: var(--text-muted); 
            margin-bottom: 1rem; 
            line-height: 1.6; 
        }

        .accordion-content strong { 
            color: var(--primary); 
        }

        /* Tables */
        .comparison-table { 
            width: 100%; 
            border-collapse: collapse; 
            margin: 1rem 0; 
            font-size: 0.875rem; 
        }

        .comparison-table th { 
            background: var(--primary-soft); 
            padding: 0.75rem 1rem; 
            text-align: left; 
            font-weight: 600; 
            font-size: 0.8125rem; 
            color: var(--primary); 
        }

        .comparison-table td { 
            padding: 0.75rem 1rem; 
            border-bottom: 1px solid var(--border); 
        }

        .comparison-table tr:last-child td { 
            border-bottom: none; 
        }

        .comparison-table tr:hover td { 
            background: var(--primary-soft); 
        }

        .tag-pass    { 
            display: inline-block; 
            padding: 0.2rem 0.6rem; 
            border-radius: 4px; 
            background: var(--success-light); 
            color: var(--success); 
            font-size: 0.75rem; 
            font-weight: 600; 
        }

        .tag-warning { 
            display: inline-block; 
            padding: 0.2rem 0.6rem; 
            border-radius: 4px; 
            background: var(--warning-light); 
            color: var(--warning); 
            font-size: 0.75rem; 
            font-weight: 600; 
        }

        .tag-fail    { 
            display: inline-block; 
            padding: 0.2rem 0.6rem; 
            border-radius: 4px; 
            background: var(--danger-light); 
            color: var(--danger); 
            font-size: 0.75rem; 
            font-weight: 600; 
        }

        /* Metrics grid */
        .metrics-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 1rem; 
            margin: 1.25rem 0; 
        }

        .metric-card { 
            background: var(--bg); 
            padding: 1rem; 
            border-radius: 8px; 
            text-align: center; 
            border: 1px solid rgba(26, 45, 78, 0.1); 
            transition: var(--transition);
        }

        .metric-card:hover {
            border-color: var(--secondary);
            transform: translateY(-2px);
        }

        .metric-label { 
            font-size: 0.7rem; 
            color: var(--text-muted); 
            margin-bottom: 0.35rem; 
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .metric-value { 
            font-size: 1.25rem; 
            font-weight: 700; 
            color: var(--primary); 
        }

        /* Performance */
        .performance-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 2rem; 
        }

        .perf-section-title { 
            font-size: 0.9375rem; 
            font-weight: 600; 
            color: var(--primary);
            margin-bottom: 1rem; 
        }

        .confusion-matrix { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 1px; 
            background: var(--border); 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            overflow: hidden; 
        }

        .matrix-cell { 
            background: var(--surface); 
            padding: 1.5rem; 
            text-align: center; 
        }

        .matrix-cell .mc-value { 
            font-size: 1.5rem; 
            font-weight: 700; 
            color: var(--primary);
        }

        .matrix-cell .mc-label { 
            font-size: 0.75rem; 
            color: var(--text-muted); 
            margin-top: 0.35rem; 
        }

        .matrix-cell.tp { 
            background: var(--success-light); 
        }
        .matrix-cell.tn { 
            background: var(--success-light); 
        }
        .matrix-cell.fp { 
            background: var(--danger-light); 
        }
        .matrix-cell.fn { 
            background: var(--danger-light); 
        }

        .na-text { 
            color: var(--text-muted); 
            font-size: 0.875rem; 
            font-style: italic; 
        }

        .home-link {
            margin-left: 0.5rem;
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .home-link:hover {
            color: var(--primary);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shap-section,
        .accordion-section,
        .performance-section {
            animation: fadeIn 0.5s ease-out forwards;
        }

        /* Custom scrollbar */
        .feature-list::-webkit-scrollbar {
            width: 6px;
        }

        .feature-list::-webkit-scrollbar-track {
            background: var(--primary-soft);
            border-radius: 3px;
        }

        .feature-list::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }

        .feature-list::-webkit-scrollbar-thumb:hover {
            background: var(--secondary);
        }

        @media (max-width: 768px) {
            .shap-grid { 
                grid-template-columns: 1fr; 
            }
            
            .performance-grid { 
                grid-template-columns: 1fr; 
            }
            
            .report-header { 
                flex-direction: column; 
                align-items: flex-start; 
            }
            
            .navbar {
                padding: 12px 5%;
            }
            
            .nav-links {
                gap: 15px;
            }
        }

        @media (max-width: 640px) {
            .nav-links {
                display: none;
            }
            
            .logo-text {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar" id="navbar">
    <a href="index.html" class="logo">
        <div class="logo-icon">
            <i class="fas fa-shield-alt"></i>
        </div>
        <div>
            <div class="logo-text">Fair<span>Trust</span></div>
            <div class="logo-subtitle">ETHICAL AI</div>
        </div>
    </a>

    <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="docs.html">Docs</a>
        <a href="admin.html">Admin</a>
    </div>
</nav>

<main class="developer-report" id="app">
    <div class="state-card">
        <i class="fas fa-spinner fa-pulse" style="font-size: 2rem; color: var(--secondary); margin-bottom: 1rem;"></i>
        <h2>Loading report…</h2>
        <p>Fetching developer data.</p>
    </div>
</main>

<script>
    const API_BASE = 'http://127.0.0.1:5000';

    // Navbar scroll effect
    window.addEventListener('scroll', function() {
        const navbar = document.getElementById('navbar');
        if (window.scrollY > 50) {
            navbar.classList.add('scrolled');
        } else {
            navbar.classList.remove('scrolled');
        }
    });

    // ── Helpers ───────────────────────────────────────────────────────────
    function fmt(v, decimals = 4) {
        return v != null ? Number(v).toFixed(decimals) : '—';
    }

    function tagClass(status) {
        const s = (status || '').toUpperCase();
        if (s === 'PASS')    return 'tag-pass';
        if (s === 'WARNING') return 'tag-warning';
        return 'tag-fail';
    }

    function dimBadge(score) {
        return score >= 0.80
            ? `<span class="dim-score-badge success">${fmt(score, 2)}</span>`
            : `<span class="dim-score-badge warning">${fmt(score, 2)}</span>`;
    }

    // ── Render: no data ───────────────────────────────────────────────────
    function renderNoData(msg) {
        document.getElementById('app').innerHTML = `
            <div class="state-card">
                <i class="fas fa-exclamation-circle" style="font-size: 2rem; color: var(--warning); margin-bottom: 1rem;"></i>
                <h2>No report found</h2>
                <p>${msg || 'Complete an evaluation first.'}</p>
                <a href="upload.html" class="btn btn-primary" style="display:inline-flex;margin-top:0.5rem">
                    <i class="fas fa-play-circle"></i> Start evaluation
                </a>
            </div>`;
    }

    // ── SHAP section ──────────────────────────────────────────────────────
    function renderShap(shap) {
        const features = shap.feature_importance || [];
        const top8     = features.slice(0, 8);
        const maxVal   = top8.length ? top8[0].shap_value : 1;

        const bars = top8.map(f => {
            const pct = Math.round((f.shap_value / maxVal) * 100);
            return `
            <div class="shap-bar-wrap">
                <div class="shap-bar" style="height:${pct}%"></div>
                <div class="shap-bar-label">${f.feature}</div>
            </div>`;
        }).join('');

        const listItems = features.slice(0, 10).map(f =>
            `<li>
                <span>${f.feature}</span>
                <span class="feature-val">${fmt(f.shap_value, 5)}</span>
            </li>`
        ).join('');

        return `
        <section class="shap-section">
            <h2 class="section-title"><i class="fas fa-chart-bar" style="margin-right:8px; color: var(--secondary);"></i>SHAP Analysis</h2>
            <div class="shap-grid">
                <div>
                    <div class="shap-plot">
                        <div class="shap-bars">${bars || '<p class="na-text">No SHAP data available.</p>'}</div>
                    </div>
                    <div class="shap-meta">
                        <div class="shap-chip"><i class="fas fa-star"></i> Top: <span>${shap.top_feature || '—'}</span></div>
                        <div class="shap-chip"><i class="fas fa-arrow-up"></i> Max: <span>${fmt(shap.shap_max, 5)}</span></div>
                        <div class="shap-chip"><i class="fas fa-arrow-down"></i> Min: <span>${fmt(shap.shap_min, 5)}</span></div>
                        <div class="shap-chip"><i class="fas fa-balance-scale"></i> Stability: <span>${fmt(shap.feature_stability, 4)}</span></div>
                    </div>
                </div>
                <div class="feature-controls">
                    <h3><i class="fas fa-list" style="color: var(--secondary); margin-right:6px;"></i>Feature Importance</h3>
                    <ul class="feature-list">${listItems || '<li class="na-text">No data</li>'}</ul>
                    <button class="btn btn-secondary" onclick="downloadSHAP()">
                        <i class="fas fa-download"></i> Download SHAP values
                    </button>
                </div>
            </div>
        </section>`;
    }

    // ── Dimension accordions ──────────────────────────────────────────────
    function renderDimensionDetail(dim) {
        const d = dim.detail || {};
        const icons = {
            1: 'fa-user-check',
            2: 'fa-users',
            3: 'fa-venus-mars',
            4: 'fa-balance-scale',
            5: 'fa-chart-pie',
            6: 'fa-random',
            7: 'fa-layer-group'
        };
        const icon = icons[dim.id] || 'fa-chart-bar';

        switch (dim.id) {
            case 1: // Individual Fairness
                return `
                    <p><i class="fas fa-info-circle" style="color: var(--secondary); margin-right:6px;"></i>${d.description || ''}</p>
                    <div class="metrics-grid">
                        <div class="metric-card"><div class="metric-label">Consistency</div><div class="metric-value">${d.consistency_pct ?? '—'}%</div></div>
                        <div class="metric-card"><div class="metric-label">Violation Rate</div><div class="metric-value">${dim.violation_rate ?? '—'}%</div></div>
                        <div class="metric-card"><div class="metric-label">Method</div><div class="metric-value" style="font-size:0.8rem">KNN k=5</div></div>
                    </div>`;

            case 2: // Group Fairness
                const groups = (d.per_attribute || []).map(g => `
                    <tr>
                        <td>${g.attribute}</td>
                        <td>${fmt(g.equalized_odds_difference, 4)}</td>
                        <td>${fmt(g.demographic_parity_difference, 4)}</td>
                        <td>${fmt(g.fairness_score, 4)}</td>
                    </tr>`).join('') || '<tr><td colspan="4" class="na-text">No attribute data</td></tr>';
                return `
                    <p><i class="fas fa-info-circle" style="color: var(--secondary); margin-right:6px;"></i>${d.description || ''}</p>
                    <table class="comparison-table">
                        <thead><tr><th>Attribute</th><th>EOD</th><th>DP Diff</th><th>Score</th></tr></thead>
                        <tbody>${groups}</tbody>
                    </table>`;

            case 3: // Demographic Bias
                const disps = (d.disparities || []).map(dp => `
                    <tr>
                        <td>${dp.attribute}</td>
                        <td>${dp.gap_pct}%</td>
                        <td>${fmt(dp.raw_dp_diff, 4)}</td>
                    </tr>`).join('') || '<tr><td colspan="3" class="na-text">No data</td></tr>';
                return `
                    <p><i class="fas fa-info-circle" style="color: var(--secondary); margin-right:6px;"></i>${d.description || ''}</p>
                    <div class="metrics-grid">
                        <div class="metric-card"><div class="metric-label">Raw DP Gap</div><div class="metric-value">${fmt(d.raw_parity_gap, 4)}</div></div>
                    </div>
                    <table class="comparison-table">
                        <thead><tr><th>Attribute</th><th>Gap %</th><th>DP Diff</th></tr></thead>
                        <tbody>${disps}</tbody>
                    </table>`;

            case 4: // Calibration
                return `
                    <p><i class="fas fa-info-circle" style="color: var(--secondary); margin-right:6px;"></i>${d.description || ''}</p>
                    <div class="metrics-grid">
                        <div class="metric-card"><div class="metric-label">Brier Score</div><div class="metric-value">${fmt(d.brier_score, 4)}</div></div>
                        <div class="metric-card"><div class="metric-label">Cal. Score</div><div class="metric-value">${fmt(d.calibration_score, 4)}</div></div>
                    </div>
                    <p style="margin-top:0.5rem">${d.interpretation || ''}</p>`;

            case 5: // Disparate Impact
                const passes = d.passes_80_rule;
                return `
                    <p><i class="fas fa-info-circle" style="color: var(--secondary); margin-right:6px;"></i>${d.description || ''}</p>
                    <table class="comparison-table">
                        <tbody>
                            <tr><td><strong>Impact Ratio</strong></td><td>${fmt(d.impact_ratio, 4)}</td></tr>
                            <tr><td><strong>Threshold</strong></td><td>${d.threshold}</td></tr>
                            <tr><td><strong>80% Rule</strong></td><td><span class="${passes ? 'tag-pass' : 'tag-warning'}">${passes ? 'PASS' : 'FAIL'}</span></td></tr>
                        </tbody>
                    </table>`;

            case 6: // Counterfactual
                return `
                    <p><i class="fas fa-info-circle" style="color: var(--secondary); margin-right:6px;"></i>${d.description || ''}</p>
                    <div class="metrics-grid">
                        <div class="metric-card"><div class="metric-label">Consistency Score</div><div class="metric-value">${fmt(d.consistency_score, 4)}</div></div>
                    </div>
                    <p style="margin-top:0.5rem">${d.interpretation || ''}</p>`;

            case 7: // Intersectional
                return `
                    <p><i class="fas fa-info-circle" style="color: var(--secondary); margin-right:6px;"></i>${d.description || ''}</p>
                    <div class="metrics-grid">
                        <div class="metric-card"><div class="metric-label">Worst-case Gap</div><div class="metric-value">${fmt(d.worst_case_gap, 4)}</div></div>
                    </div>
                    <p style="margin-top:0.5rem">${d.interpretation || ''}</p>`;

            default:
                return `<p>${d.description || 'No detail available.'}</p>`;
        }
    }

    function renderAccordions(dimensions) {
        const icons = {
            1: 'fa-user-check',
            2: 'fa-users',
            3: 'fa-venus-mars',
            4: 'fa-balance-scale',
            5: 'fa-chart-pie',
            6: 'fa-random',
            7: 'fa-layer-group'
        };

        const items = dimensions.map((dim, i) => {
            const icon = icons[dim.id] || 'fa-chart-bar';
            return `
            <div class="accordion-item" id="dimension${dim.id}">
                <div class="accordion-header" onclick="toggleAccordion(this, ${i})">
                    <div class="accordion-title">
                        <i class="fas ${icon}"></i>
                        <span>${dim.title}</span>
                        ${dimBadge(dim.score)}
                    </div>
                    <span class="accordion-arrow" id="arrow-${i}"><i class="fas fa-chevron-down"></i></span>
                </div>
                <div class="accordion-content" id="content-${i}">
                    ${renderDimensionDetail(dim)}
                </div>
            </div>`;
        }).join('');

        return `
        <section class="accordion-section">
            <h2 class="section-title"><i class="fas fa-balance-scale" style="margin-right:8px; color: var(--secondary);"></i>Fairness Dimensions Analysis</h2>
            ${items}
        </section>`;
    }

    // ── Model performance section ─────────────────────────────────────────
    function renderPerformance(perf) {
        const cm = perf.confusion_matrix || {};
        const tpVal = cm.true_positives  != null ? cm.true_positives  : null;
        const fpVal = cm.false_positives != null ? cm.false_positives : null;
        const fnVal = cm.false_negatives != null ? cm.false_negatives : null;
        const tnVal = cm.true_negatives  != null ? cm.true_negatives  : null;
        const hasMatrix = tpVal != null;

        const cmHtml = hasMatrix ? `
            <div class="confusion-matrix">
                <div class="matrix-cell tp"><div class="mc-value">${tpVal}</div><div class="mc-label">True Positives</div></div>
                <div class="matrix-cell fp"><div class="mc-value">${fpVal}</div><div class="mc-label">False Positives</div></div>
                <div class="matrix-cell fn"><div class="mc-value">${fnVal}</div><div class="mc-label">False Negatives</div></div>
                <div class="matrix-cell tn"><div class="mc-value">${tnVal}</div><div class="mc-label">True Negatives</div></div>
            </div>` : `<p class="na-text">Confusion matrix not available — requires raw count data from evaluation.</p>`;

        return `
        <section class="performance-section">
            <h2 class="section-title"><i class="fas fa-chart-line" style="margin-right:8px; color: var(--secondary);"></i>Model Performance Metrics</h2>
            <div class="performance-grid">
                <div>
                    <div class="perf-section-title"><i class="fas fa-th" style="margin-right:6px; color: var(--secondary);"></i>Confusion Matrix</div>
                    ${cmHtml}
                </div>
                <div>
                    <div class="perf-section-title"><i class="fas fa-chart-pie" style="margin-right:6px; color: var(--secondary);"></i>Metrics Summary</div>
                    <table class="comparison-table">
                        <tbody>
                            <tr><td>AUC-ROC</td><td><strong>${fmt(perf.roc_auc, 4)}</strong></td></tr>
                            <tr><td>Accuracy</td><td><strong>${fmt(perf.accuracy, 4)}</strong></td></tr>
                            <tr><td>F1-Score</td><td><strong>${fmt(perf.f1_score, 4)}</strong></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>`;
    }

    // ── Full render ───────────────────────────────────────────────────────
    function renderReport(data, evalId) {
        const backLink = `index.html`;
        document.getElementById('app').innerHTML = `
            <div class="report-header">
                <div>
                    <h1>Developer Report — Technical Deep Dive</h1>
                    <div class="report-meta">
                        <i class="fas fa-fingerprint" style="margin-right:4px; color: var(--secondary);"></i> Eval ID: <code>${evalId || '—'}</code> &nbsp;|&nbsp;
                        <i class="fas fa-star" style="color: var(--secondary);"></i> Ethical Score: <strong>${fmt(data.ethical_score, 2)}</strong> &nbsp;|&nbsp;
                        <i class="fas fa-database"></i> ${data.records ? data.records.toLocaleString() + ' records' : ''}
                        <a href="${backLink}" class="home-link"><i class="fas fa-home"></i> Home</a>
                    </div>
                </div>
                <div class="export-buttons">
                    <button class="btn btn-secondary" onclick="downloadJSON()"><i class="fas fa-file-code"></i> JSON</button>
                    <button class="btn btn-primary" onclick="downloadModelCard()"><i class="fas fa-file-pdf"></i> Model Card</button>
                </div>
            </div>
            ${renderShap(data.shap || {})}
            ${renderAccordions(data.dimensions || [])}
            ${renderPerformance(data.model_performance || {})}`;

        // Auto-open accordion if hash present (e.g. #dimension3)
        const hash = window.location.hash;
        if (hash) {
            const dimId = parseInt(hash.replace('#dimension', ''));
            if (!isNaN(dimId)) {
                const idx = dimId - 1;
                const content = document.getElementById(`content-${idx}`);
                const arrow   = document.getElementById(`arrow-${idx}`);
                if (content) {
                    content.classList.add('active');
                    if (arrow) arrow.classList.add('open');
                    setTimeout(() => {
                        document.getElementById(`dimension${dimId}`)?.scrollIntoView({ behavior: 'smooth' });
                    }, 100);
                }
            }
        }
    }

    // ── Accordion toggle ──────────────────────────────────────────────────
    function toggleAccordion(header, idx) {
        const content = document.getElementById(`content-${idx}`);
        const arrow   = document.getElementById(`arrow-${idx}`);
        if (!content) return;
        content.classList.toggle('active');
        arrow?.classList.toggle('open');
    }

    // ── Actions ───────────────────────────────────────────────────────────
    function downloadSHAP() {
        const cached = sessionStorage.getItem('eval_result');
        if (!cached) { alert('No SHAP data available.'); return; }
        const data = JSON.parse(cached);
        const blob = new Blob([JSON.stringify(data.shap || {}, null, 2)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = 'shap_values.json'; a.click();
    }

    function downloadJSON() {
        const cached = sessionStorage.getItem('eval_result');
        if (!cached) { alert('No data to download.'); return; }
        const blob = new Blob([cached], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = 'developer_report.json'; a.click();
    }

    function downloadModelCard() {
        alert('Generating model card PDF…');
    }

    // ── Init ──────────────────────────────────────────────────────────────
    (async function init() {
        const evalId = new URLSearchParams(location.search).get('eval_id')
                    || sessionStorage.getItem('eval_id');

        if (!evalId) { renderNoData('No evaluation ID found.'); return; }

        try {
            const res  = await fetch(`${API_BASE}/report/developer/${evalId}`);
            const data = await res.json();

            if (res.ok && data.status === 'complete') {
                renderReport(data, evalId);
            } else {
                throw new Error(data.error || 'not complete');
            }
        } catch (_) {
            // Fallback to cached eval_result from processing
            const cached = sessionStorage.getItem('eval_result');
            if (cached) {
                const raw = JSON.parse(cached);
                // Shape raw eval into the same structure the API returns
                renderReport({
                    ethical_score:    raw.ethical_score,
                    records:          raw.records,
                    shap:             raw.shap ? {
                        top_feature:       raw.shap.topFeature,
                        shap_max:          raw.shap.shapMax,
                        shap_min:          raw.shap.shapMin,
                        feature_stability: raw.shap.featureStability,
                        feature_importance: Object.entries(raw.shap.feature_importance || {})
                            .sort((a, b) => b[1] - a[1])
                            .map(([feature, shap_value]) => ({ feature, shap_value })),
                    } : {},
                    dimensions:       [],   // no dimension detail without API
                    model_performance: raw.model_metrics ? {
                        accuracy:         raw.model_metrics.accuracy,
                        f1_score:         raw.model_metrics.f1_score,
                        roc_auc:          raw.model_metrics.roc_auc,
                        confusion_matrix: {},
                    } : {},
                }, evalId);
                return;
            }
            renderNoData('Could not load developer report.');
        }
    })();

    // Make functions global for onclick handlers
    window.toggleAccordion = toggleAccordion;
    window.downloadSHAP = downloadSHAP;
    window.downloadJSON = downloadJSON;
    window.downloadModelCard = downloadModelCard;
</script>
</body>
</html>
